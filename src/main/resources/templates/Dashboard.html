
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName}">Finwing</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Font (optional but makes UI better) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- JS -->
    <script defer th:src="@{/js/script.js}"></script>
</head>

<body>

    <!-- Navbar -->
    <div th:replace="navbar :: header"></div>

    <!-- MAIN DASHBOARD -->
    <main class="main" th:fragment="dashboard">

        <section id="tab-dashboard" class="tab-content active">

            <!-- HEADER -->
            <div class="page-header">
                <h1>Financial Overview</h1>
                <p id="dashSubtitle">Welcome back 👋</p>
            </div>

            <!-- METRICS -->
            <div class="metrics-grid">

                <div class="metric-card income">
                    <span class="metric-label">Total Income</span>
                    <span class="metric-icon">↑</span>
                    <h2 class="metric-value" id="m-income">₹0</h2>
                </div>

                <div class="metric-card expense">
                    <span class="metric-label">Total Expenses</span>
                    <span class="metric-icon">↓</span>
                    <h2 class="metric-value" id="m-expenses">₹0</h2>
                </div>

                <div class="metric-card balance">
                    <span class="metric-label">Net Balance</span>
                    <span class="metric-icon">◈</span>
                    <h2 class="metric-value" id="m-balance">₹0</h2>
                </div>

                <div class="metric-card savings">
                    <span class="metric-label">Savings Rate</span>
                    <span class="metric-icon">◎</span>
                    <h2 class="metric-value" id="m-savings">0%</h2>
                </div>

            </div>

            <!-- CHARTS + TRANSACTIONS -->
            <div class="two-col">

                <!-- Expense Chart -->
                <div class="card">
                    <h3 class="card-title">Expense Breakdown</h3>
                    <div id="categoryChart">
                        <!-- Chart.js will render here -->
                    </div>
                </div>

                <!-- Recent Transactions -->
                <div class="card">
                    <h3 class="card-title">Recent Transactions</h3>

                    <div id="recentList">
                        <!-- Example static UI (replace with Thymeleaf loop later) -->
                        <div class="transaction-item">
                            <span>Food</span>
                            <span class="expense">-₹250</span>
                        </div>
                        <div class="transaction-item">
                            <span>Salary</span>
                            <span class="income">+₹25,000</span>
                        </div>
                    </div>
                </div>

            </div>

            <!-- INSIGHT -->
            <div class="card insight-card">
                <div class="insight-icon">✦</div>
                <div>
                    <strong>Insight</strong>
                    <p id="insightText">
                        You spent more on food this week. Try reducing eating out.
                    </p>
                </div>
            </div>
<div style="width: 50%; max-width: 400px; padding: 50px;">
    <canvas id="expenseChart"></canvas>
</div>
        </section>

    </main>

    <script>
const ctx = document.getElementById('expenseChart');

new Chart(ctx, {
    type: 'doughnut',  // can change to 'bar' or 'line'
    data: {
        labels: ['Food', 'Rent', 'Transport', 'Shopping', 'Other'],
        datasets: [{
            label: 'Expenses',
            data: [3000, 8000, 2000, 1500, 1000],
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: {
                    color: "#ffffff"
                }
            }
        }
    }
});
</script>
</body>
</html>
