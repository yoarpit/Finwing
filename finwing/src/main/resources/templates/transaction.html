<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName}">Finwing - Transactions</title>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/homestyle.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <style>
        /* Ensuring the dynamic rows match your table-header grid */
        .table-row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1.5fr 1fr 1fr 1fr;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            align-items: center;
            transition: background 0.2s;
        }
        .table-row:hover {
            background: rgba(255, 255, 255, 0.03);
        }
        .text-income { color: #2ecc71; font-weight: bold; }
        .text-expense { color: #e74c3c; font-weight: bold; }
        .btn-delete {
            color: #ff4d4d;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    
    <div th:replace="~{navbar :: header}"></div>

    <section id="tab-transactions" class="tab-content" style="padding: 20px; max-width: 1200px; margin: 0 auto;">
        
        <div class="page-header-row">
            <div class="page-title">
                <h1>Transactions</h1>
                <p id="txSubtitle" th:text="${transactions != null ? transactions.size() + ' records found' : '0 records found'}">Loading...</p>
            </div>
            <button class="btn-gold" id="toggleFormBtn">+ Add Transaction</button>
        </div>

        <div class="card add-form hidden" id="addForm" style="margin-bottom: 30px;">
            <form th:action="@{/transaction/add}" method="post">
                <h3 class="form-title">NEW TRANSACTION</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" name="description" id="f-desc" placeholder="e.g. Grocery shopping" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" step="0.01" name="amount" id="f-amount" placeholder="0" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" name="date" id="f-date" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select name="type" id="f-type" class="input-field">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" id="f-category" class="input-field">
                            <option value="Food">Food</option>
                            <option value="Housing">Housing</option>
                            <option value="Transport">Transport</option>
                            <option value="Health">Health</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Savings">Savings</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group" style="display:flex;align-items:flex-end;">
                        <button type="submit" class="btn-gold" id="submitBtn" style="width:100%">Add</button>
                    </div>
                </div>
            </form>
            <p id="formError" class="form-error hidden"></p>
        </div>

        <div class="card table-card">
            <div class="table-header" style="display: grid; grid-template-columns: 2fr 1.5fr 1.5fr 1fr 1fr 1fr; font-weight: bold; padding: 15px; border-bottom: 2px solid ;">
                <span>Description</span>
                <span>Category</span>
                <span>Date</span>
                <span>Type</span>
                <span>Amount</span>
                <span>Action</span>
            </div>
            
            <div id="txTableBody">
                <div th:if="${#lists.isEmpty(transactions)}" style="padding: 40px; text-align: center; color: #888;">
                    No transactions found. Click "+ Add Transaction" to start.
                </div>

                <div class="table-row" th:each="tx : ${transactions}">
                    <span th:text="${tx.description}">Description</span>
                    <span th:text="${tx.category}">Category</span>
                    <span th:text="${#temporals.format(tx.date, 'dd MMM yyyy')}">Date</span>
                    <span th:text="${#strings.capitalize(tx.type)}" 
                          th:classappend="${tx.type == 'income' ? 'text-income' : 'text-expense'}">Type</span>
                    <span th:text="'₹' + ${tx.amount}">₹0</span>
                    <span>
                        <a th:href="@{/transaction/delete/{id}(id=${tx.id})}" 
                           class="btn-delete" 
                           onclick="return confirm('Are you sure you want to delete this?')">Delete</a>
                    </span>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>© 2026 Finwing · Financial Intelligence Platform · All rights reserved.</p>
    </footer>

    <script th:src="@{/js/theme.js}"></script>
    <script>
        // Toggle the visibility of the Add Form
        const toggleBtn = document.getElementById('toggleFormBtn');
        const addForm = document.getElementById('addForm');

        toggleBtn.addEventListener('click', () => {
            if (addForm.classList.contains('hidden')) {
                addForm.classList.remove('hidden');
            } else {
                addForm.classList.add('hidden');
            }
        });

        // Set default date to today
        document.getElementById('f-date').valueAsDate = new Date();
    </script>
</body>
</html>
