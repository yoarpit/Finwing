<th:block th:fragment="header">
    <style>
        .nav-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1px solid var(--border, #1e1e2e);
            border-radius: 8px;
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s ease;
            z-index: 200;
        }

        .nav-toggle span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text, var(--text-primary, #e8e4dc));
            border-radius: 2px;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        .nav-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .nav-toggle.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .nav-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .nav-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .nav-drawer {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100vh;
            background: var(--bg2, #111118);
            border-left: 1px solid var(--border, #1e1e2e);
            z-index: 160;
            display: flex;
            flex-direction: column;
            padding: 0;
            transition: right 0.32s cubic-bezier(.4,0,.2,1);
            box-shadow: -8px 0 40px rgba(0,0,0,0.5);
        }

        .nav-drawer.open { right: 0; }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border, #1e1e2e);
        }

        .drawer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .drawer-logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--gold, #d4af37), #8b6914);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: #0a0a0f;
            font-weight: bold;
        }

        .drawer-close {
            background: none;
            border: none;
            color: var(--muted, #888);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
        }

        .drawer-nav {
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
            gap: 4px;
            flex: 1;
        }

        .drawer-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 500;
            color: var(--muted, #888);
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .drawer-link:hover {
            background: var(--bg3, #16161f);
            color: var(--text, #e8e4dc);
        }

        .drawer-link-icon {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .drawer-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border, #1e1e2e);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .drawer-footer .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green, #22c55e);
            box-shadow: 0 0 6px var(--green, #22c55e);
        }

        .drawer-footer span {
            font-size: 12px;
            color: var(--muted, #888);
            font-family: monospace;
        }


        @media (max-width: 768px) {
            .header .nav,
            .header .status-dot {
                display: none !important;
            }

            .header-inner {
                justify-content: space-between;
            }

            .nav-toggle {
                display: flex;
            }

        }

        body.drawer-open {
            overflow: hidden;
        }
    </style>

    <div class="nav-overlay" id="navOverlay" onclick="closeDrawer()"></div>

    <div class="nav-drawer" id="navDrawer" role="dialog" aria-modal="true" aria-label="Navigation menu">
        <div class="drawer-header">
            <div class="drawer-logo">
                <div class="drawer-logo-icon">₹</div>
                <span class="drawer-logo-name">Finwing</span>
            </div>
            <button class="drawer-close" onclick="closeDrawer()" aria-label="Close menu">x</button>
        </div>

        <nav class="drawer-nav" th:if="${session.user == null}">
            <a class="drawer-link" href="/" onclick="closeDrawer()"><span class="drawer-link-icon">🏠</span>Home</a>
            <a class="drawer-link" href="/transaction" onclick="closeDrawer()"><span class="drawer-link-icon">💳</span>Transactions</a>
            <a class="drawer-link" href="/login" onclick="closeDrawer()"><span class="drawer-link-icon">🔑</span>Login</a>
            <a class="drawer-link" href="/registration" onclick="closeDrawer()"><span class="drawer-link-icon">✨</span>Sign Up</a>
        </nav>

        <nav class="drawer-nav" th:if="${session.user != null}">
            <a class="drawer-link" href="/" onclick="closeDrawer()"><span class="drawer-link-icon">🏠</span>Home</a>
            <a class="drawer-link" href="/transaction" onclick="closeDrawer()"><span class="drawer-link-icon">💳</span>Transactions</a>
            <a class="drawer-link" href="/dashboard" onclick="closeDrawer()"><span class="drawer-link-icon">👤</span>Dashboard</a>
            <a class="drawer-link" href="/logout" onclick="closeDrawer()"><span class="drawer-link-icon">🚪</span>Logout</a>
        </nav>

        <div class="drawer-footer">
            <div class="live-dot"></div>
            <span id="drawerMonthLabel">April 2026</span>
        </div>
    </div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">₹</div>
                <div>
                    <div class="logo-name">Finwing</div>
                    <div class="logo-sub">FINANCE MANAGER</div>
                </div>
            </div>

            <nav class="nav" th:if="${session.user == null}">
                <button class="tab-btn active" onclick="window.location.href='/'">Home</button>
                <button class="tab-btn" onclick="window.location.href='/transaction'">Transactions</button>
                <button class="tab-btn" onclick="window.location.href='/login'">Login</button>
                <button class="tab-btn" onclick="window.location.href='/registration'">Sign Up</button>
            </nav>

            <nav class="nav" th:if="${session.user != null}">
                <button class="tab-btn active" onclick="window.location.href='/'">Home</button>
                <button class="tab-btn" onclick="window.location.href='/transaction'">Transactions</button>
                <button class="tab-btn" onclick="window.location.href='/dashboard'">Dashboard</button>
                <button class="tab-btn" onclick="window.location.href='/logout'">Logout</button>
            </nav>

            <div class="status-dot">
                <div class="dot"></div>
                <span id="monthLabel">April 2026</span>
            </div>

            <button class="nav-toggle" id="navToggle" onclick="toggleDrawer()" aria-label="Open navigation menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('navDrawer');
            const isOpen = drawer.classList.contains('open');
            if (isOpen) {
                closeDrawer();
            } else {
                openDrawer();
            }
        }

        function openDrawer() {
            const drawer = document.getElementById('navDrawer');
            const overlay = document.getElementById('navOverlay');
            const toggle = document.getElementById('navToggle');
            if (!drawer || !overlay || !toggle) return;
            drawer.classList.add('open');
            overlay.classList.add('visible');
            toggle.classList.add('open');
            toggle.setAttribute('aria-expanded', 'true');
            document.body.classList.add('drawer-open');
        }

        function closeDrawer() {
            const drawer = document.getElementById('navDrawer');
            const overlay = document.getElementById('navOverlay');
            const toggle = document.getElementById('navToggle');
            if (drawer) drawer.classList.remove('open');
            if (overlay) overlay.classList.remove('visible');
            if (toggle) {
                toggle.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
            }
            document.body.classList.remove('drawer-open');
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeDrawer();
        });

        (function syncMonthLabel() {
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            const now = new Date();
            const label = months[now.getMonth()] + ' ' + now.getFullYear();
            document.querySelectorAll('#monthLabel, #drawerMonthLabel').forEach(function (el) {
                el.textContent = label;
            });
        })();
    </script>
</th:block>
