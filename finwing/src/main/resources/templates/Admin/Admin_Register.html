<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWing Admin Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <header>
                <h1>Fin<span>Wing</span></h1>
                <p>Create Admin Account</p>
            </header>

            <form>
                <div class="input-group">
                    <label>FULL NAME</label>
                    <input type="text" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label>ADMIN EMAIL</label>
                    <input type="email" placeholder="admin@finwing.ai" required>
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label>CONFIRM PASSWORD</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">REGISTER ADMIN</button>
            </form>

            <footer>
                <p>Already have an account? <a href="login.html" class="forgot-link">Login here</a></p>
                <p class="copyright">&copy; 2026 FinWing AI System</p>
            </footer>
        </div>
    </div>
</body>
</html>
