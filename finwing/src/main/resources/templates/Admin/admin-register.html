<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finwing · Admin Register</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0a0a0a;--surface:#141414;--border:#2a2a2a;--border2:#383838;--red:#e63946;--text:#e8e8e8;--muted:#777}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
        .navbar{height:56px;background:#100e0e;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:10px}
        .nav-icon{width:32px;height:32px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;font-family:'IBM Plex Mono',monospace}
        .nav-brand{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600}
        .nav-sub{font-size:.7rem;color:var(--red);letter-spacing:.1em;text-transform:uppercase;margin-left:.5rem}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
        .card{width:100%;max-width:420px;background:var(--surface);border:1px solid #e6394630;border-radius:14px;overflow:hidden;animation:fadeUp .4s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .card-header{padding:1.6rem 1.8rem 1.3rem;border-bottom:1px solid var(--border);background:#e6394608}
        .tag{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--red);margin-bottom:.5rem}
        .card-header h1{font-size:1.5rem;font-weight:600}
        .card-header p{font-size:.85rem;color:var(--muted);margin-top:.3rem}
        .card-body{padding:1.5rem 1.8rem}
        .field{margin-bottom:1rem}
        .field label{display:block;font-size:.7rem;letter-spacing:.1em;color:#999;text-transform:uppercase;margin-bottom:.45rem}
        .field input{width:100%;background:#111;border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:.875rem;padding:.72rem .95rem;outline:none;transition:border .2s;font-family:'Inter',sans-serif}
        .field input:focus{border-color:var(--red);background:#e6394610}
        .field input::placeholder{color:#555}
        .field small{color:#ff9090;font-size:.75rem;display:block;margin-top:.25rem}
        .btn-primary{width:100%;background:var(--red);color:#fff;border:none;border-radius:8px;padding:.8rem;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;margin-top:.5rem}
        .btn-primary:hover{background:#c0303c}
        .alert{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem}
        .alert-error{background:#e6394620;border:1px solid #e6394650;color:#ff9090}
        .links{text-align:center;margin-top:1rem;font-size:.82rem;color:var(--muted)}
        .links a{color:var(--red);text-decoration:none}
        footer{padding:1.2rem;text-align:center;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-icon">ADM</div>
    <span class="nav-brand">Finwing</span>
    <span class="nav-sub">Admin Portal</span>
</nav>

<main>
    <div class="card">
        <div class="card-header">
            <div class="tag">ADMIN REGISTRATION</div>
            <h1>Create Admin Account</h1>
            <p>Set up administrator credentials</p>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/admin/register}" th:object="${admin}" method="post">
                <div class="field">
                    <label>Admin Name</label>
                    <input type="text" th:field="*{adminName}" placeholder="SuperAdmin" required/>
                    <small th:if="${#fields.hasErrors('adminName')}" th:errors="*{adminName}"></small>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="admin@finwing.com" required/>
                    <small th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="Min 6 characters" required/>
                    <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
                </div>
                <button type="submit" class="btn-primary">Register Admin</button>
            </form>

            <div class="links">
                <p>Already registered? <a th:href="@{/admin/login}">Login here</a></p>
            </div>
        </div>
    </div>
</main>

<footer>© 2026 Finwing · Admin Portal</footer>
</body>
</html>
