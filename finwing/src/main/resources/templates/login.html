<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finwing · Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: #2a2a2a;
            --border2: #383838;
            --gold: #d4a017;
            --gold-text: #f0c040;
            --text: #e8e8e8;
            --muted: #888;
            --green: #3ddc84;
            --red: #ff5c5c;
            --radius: 6px
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .navbar {
            height: 56px;
            background: #111;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 32px;
            gap: 10px
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            background: var(--gold);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #0e0e0e
        }

        .nav-brand {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 600
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            overflow: hidden;
            animation: fadeUp .4s ease
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card-header {
            padding: 1.6rem 1.8rem 1.3rem;
            border-bottom: 1px solid var(--border)
        }

        .tag {
            font-family: 'IBM Plex Mono', monospace;
            font-size: .65rem;
            letter-spacing: .15em;
            color: var(--gold);
            margin-bottom: .5rem
        }

        .card-header h1 {
            font-size: 1.5rem;
            font-weight: 600
        }

        .card-header p {
            font-size: .85rem;
            color: var(--muted);
            margin-top: .3rem
        }

        .card-body {
            padding: 1.5rem 1.8rem
        }

        .field {
            margin-bottom: 1rem
        }

        .field label {
            display: block;
            font-size: .7rem;
            letter-spacing: .1em;
            color: #999;
            text-transform: uppercase;
            margin-bottom: .45rem
        }

        .field input {
            width: 100%;
            background: #111;
            border: 1px solid var(--border2);
            border-radius: 7px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: .875rem;
            padding: .72rem .95rem;
            outline: none;
            transition: border .2s, background .2s
        }

        .field input:focus {
            border-color: var(--gold);
            background: #d4a01715
        }

        .field input::placeholder {
            color: #555
        }

        .btn-primary {
            width: 100%;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: .8rem;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background .2s
        }

        .btn-primary:hover {
            background: #e8b020
        }

        .alert {
            padding: .75rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            margin-bottom: 1rem
        }

        .alert-error {
            background: #ff5c5c22;
            border: 1px solid #ff5c5c55;
            color: #ff9a9a
        }

        .alert-success {
            background: #3ddc8422;
            border: 1px solid #3ddc8455;
            color: #7eedc0
        }

        .links {
            text-align: center;
            margin-top: 1.2rem;
            font-size: .82rem;
            color: var(--muted)
        }

        .links a {
            color: var(--gold-text);
            text-decoration: none
        }

        .links a:hover {
            text-decoration: underline
        }

        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: 1.2rem 0;
            color: var(--muted);
            font-size: .8rem
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border2)
        }

        .btn-outline {
            width: 100%;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: .75rem;
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .2s;
            text-align: center;
            display: block;
            text-decoration: none
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold)
        }

        footer {
            padding: 1.2rem;
            text-align: center;
            font-size: .75rem;
            color: var(--muted);
            border-top: 1px solid var(--border)
        }
    </style>
</head>

<body>
    <div th:replace="navbar :: header"></div>

    <main>
        <div class="card">
            <div class="card-header">
                <div class="tag">USER LOGIN</div>
                <h1>Welcome back</h1>
                <p>Sign in to your financial dashboard</p>
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="field">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="you@email.com" required autofocus />
                    </div>
                    <div class="field">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required />
                    </div>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>

                <div class="divider">or</div>
                <!-- <a href="/admin/login" class="btn-outline">Admin Login</a> -->
                <div class="links">
                    <p>Don't have an account? <a th:href="@{/registration}">Create one</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>© 2026 Finwing · Financial Intelligence Platform</footer>
</body>

</html>
