<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>finwing login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/homestyle.css}">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: #2a2a2a;
            --border2: #383838;
            --gold: #d4a017;
            --gold-text: #f0c040;
            --text: #e8e8e8;
            --muted: #888888;
            --green: #3ddc84;
            --red: #ff5c5c;
            --radius: 6px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            height: 56px;
            background: #111;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 32px;
        }

        .nav-icon {
            width: 32px;
            height: 32px;
            background: var(--gold);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            font-size: 15px;
            color: #0e0e0e;
            margin-right: 10px;
        }

        .nav-brand-name {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .nav-brand-sub {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: block;
            margin-top: 1px;
        }

        .nav-links {
            display: flex;
            gap: 4px;
            margin-left: auto;
        }

        .nav-link {
            padding: 6px 16px;
            font-size: 13px;
            color: var(--muted);
            border-radius: 4px;
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-link.active {
            background: var(--gold);
            color: #0e0e0e;
            font-weight: 600;
        }

        .nav-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
            margin-left: 20px;
        }

        .nav-dot-circle {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 48px 24px;
            width: 100%;
            max-width: 100%;
        }

        /* CARD */
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* left align */
            justify-content: center;
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            gap: 4px;
            /* spacing between lines */
        }

        .card-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--gold-text);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
             line-height: 1.3;
        }

        .card-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: -15px;
        }

        .card-body {
            padding: 20px;
        }

        /* INPUTS */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: .8px;
            text-transform: uppercase;
            margin-bottom: 7px;
            font-weight: 500;
        }

        .field-wrap {
            position: relative;
        }

        .field input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            padding: 10px 40px 10px 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            outline: none;
            transition: border-color .2s;
        }

        .field input:focus {
            border-color: var(--gold);
        }

        .toggle-btn {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--muted);
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .check-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: var(--muted);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 12px;
            color: var(--gold-text);
            text-decoration: none;
        }

        /* BUTTONS */
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: #0e0e0e;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
    justify-content: center;  /* center horizontally */
    align-items: center;      /* center vertically */
    gap: 6px; 
        }

        .btn-primary:hover {
            background: #c49010;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-ghost {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-ghost:hover {
            background: var(--surface2);
        }

        /* STATS */
        .stats-strip {
            display: flex;
            border-top: 1px solid var(--border);
            background: #131313;
        }

        .stat-item {
            flex: 1;
            padding: 14px;
            border-right: 1px solid var(--border);
            text-align: center;
        }

        .stat-item:last-child {
            border-right: none;
        }

        .stat-val {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            color: var(--gold-text);
            font-weight: 600;
        }

        .stat-lbl {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 2px;
        }

        .card-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .card-footer a {
            color: var(--gold-text);
            text-decoration: none;
        }

        @media (max-width: 480px) {

            .nav-links,
            .nav-dot {
                display: none;
            }
        }

        /* 🔥 FINAL PROFESSIONAL RESPONSIVE */

/* General Fix */
.card {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
}

/* Tablet */
@media (max-width: 768px) {

    .main {
        padding: 32px 16px;
    }

    .card {
        max-width: 100%;
    }

    .card-header {
        padding: 20px;
    }

    .card-body {
        padding: 18px;
    }
}

/* Mobile Perfect Layout */
@media (max-width: 600px) {

    .main {
        padding: 24px 12px;
        justify-content: center;
    }

    .card {
        border-radius: 6px;
    }

    .card-header {
        padding: 16px;
    }

    .card-title {
        font-size: 18px;
    }

    .card-sub {
        font-size: 11px;
        margin-top: -8px;
    }

    .card-body {
        padding: 14px;
    }

    .field {
        margin-bottom: 14px;
    }

    .field input {
        font-size: 13px;
        padding: 10px 38px 10px 12px;
    }

    .meta-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .btn-primary {
        font-size: 13px;
        padding: 11px;
    }

    .btn-ghost {
        font-size: 12px;
        padding: 10px;
    }

    /* 🔥 important mobile fix */
    .stats-strip {
        flex-direction: column;
    }

    .stat-item {
        border-right: none;
        border-bottom: 1px solid var(--border);
    }

    .stat-item:last-child {
        border-bottom: none;
    }

    .card-footer {
        font-size: 11px;
        padding: 12px;
    }
}

/* Small phones */
@media (max-width: 400px) {

    .card-title {
        font-size: 16px;
    }

    .btn-primary {
        font-size: 12px;
        padding: 10px;
    }
}
        
    </style>
</head>

<body>

    <div th:replace="navbar :: header"></div>

    <div class="main">
        <div class="card">
            <div class="card-header">
                <div class="card-label">Account Access</div>
                <div class="card-title">Log In</div>
                <div class="card-sub">Please Log In in your FinWing</div>
            </div>

            <div class="card-body">
                <form th:action="@{/login}" method="POST">
                    <div class="field">
                        <label>Email / Username</label>
                        <input type="email" name="email" placeholder="e.g. rahul@email.com" required />
                    </div>

                    <div class="field">
                        <label>Password</label>
                        <div class="field-wrap">
                            <input type="password" id="password" name="password" placeholder="••••••••" required />
                            <button type="button" class="toggle-btn" onclick="togglePass()">👁</button>
                        </div>
                    </div>

                    <div class="meta-row">
                        <label class="check-label">
                            <input type="checkbox" name="remember" /> Remember me
                        </label>
                        <a href="#" class="forgot-link">Forget Password</a>
                    </div>

                    <button type="submit" class="btn-primary">Login &rarr;</button>
                </form>

                <div class="divider">OR</div>

                <button class="btn-ghost" onclick="alert('Redirecting to Google...')">
                    <svg width="16" height="16" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                        <path fill="#FBBC05"
                            d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                    </svg>
                    Continue with Google
                </button>
            </div>

            <div class="stats-strip">
                <div class="stat-item">
                    <div class="stat-val">10K+</div>
                    <div class="stat-lbl">Users</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val">₹2.4L</div>
                    <div class="stat-lbl">Avg. Saved</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val">AI</div>
                    <div class="stat-lbl">Powered</div>
                </div>
            </div>

             <div class="card-footer">
                Don't have an account? <a th:href="@{/registration}" class="text-amber-500 font-semibold">Sign Up</a>
            </div>
        </div>
    </div>
    <div th:replace="footer :: footer"></div>
    <script>
        function togglePass() {
            const passInput = document.getElementById('password');
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>
