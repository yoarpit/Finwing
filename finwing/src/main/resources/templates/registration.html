<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Finwing · Register</title>
        <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0f0f0f;--surface:#1a1a1a;--border:#2a2a2a;--border2:#333;--gold:#f5a623;--text:#fff;--muted:#888;--label:#999;--input-bg:#111;--error:#ff4f4f;--success:#4caf50}
        body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
        nav{display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;border-bottom:1px solid var(--border);background:var(--bg)}
        .brand{display:flex;align-items:center;gap:.75rem}
        .brand-icon{width:34px;height:34px;background:var(--gold);border-radius:8px;display:grid;place-items:center;font-family:'Space Mono',monospace;font-weight:700;font-size:.95rem;color:#000}
        .brand-text span{display:block;font-weight:600;font-size:1rem}
        .brand-text small{font-size:.6rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
        .card{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;overflow:hidden;animation:fadeUp .45s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .card-header{padding:1.6rem 1.8rem 1.3rem;border-bottom:1px solid var(--border)}
        .tag{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--gold);margin-bottom:.5rem}
        .card-header h1{font-size:1.6rem;font-weight:600}
        .card-header p{font-size:.85rem;color:var(--muted);margin-top:.3rem}
        .card-body{padding:1.5rem 1.8rem}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
        .field{margin-bottom:.95rem}
        .field label{display:block;font-size:.68rem;letter-spacing:.1em;color:var(--label);text-transform:uppercase;margin-bottom:.45rem}
        .field input,.field select{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;padding:.72rem .95rem;outline:none;transition:border .2s,background .2s;-webkit-appearance:none}
        .field input:focus,.field select:focus{border-color:var(--gold);background:#f5a62318}
        .field input::placeholder{color:#555}
        .field select option{background:var(--surface)}
        .gender-group{display:flex;gap:.55rem}
        .gender-opt{flex:1}
        .gender-opt input[type=radio]{display:none}
        .gender-opt label{display:block;text-align:center;padding:.65rem .3rem;border:1px solid var(--border2);border-radius:7px;font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s}
        .gender-opt input:checked+label{border-color:var(--gold);color:var(--gold);background:#f5a62318}
        .btn-primary{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:.85rem;font-size:.9rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;margin-top:.5rem}
        .btn-primary:hover{background:#e09420}
        .alert{padding:.75rem 1rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem}
        .alert-error{background:#ff4f4f20;border:1px solid #ff4f4f55;color:#ff9090}
        .links{text-align:center;margin-top:1rem;font-size:.82rem;color:var(--muted)}
        .links a{color:var(--gold);text-decoration:none}
        footer{padding:1.2rem;text-align:center;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}

        /* Password field with eye toggle */
        .pwd-wrapper{position:relative}
        .pwd-wrapper input{padding-right:2.8rem}
        .pwd-toggle{position:absolute;right:.85rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);display:flex;align-items:center;padding:0;transition:color .2s}
        .pwd-toggle:hover{color:var(--gold)}
        .pwd-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

        /* Strength bar */
        .strength-bar{display:flex;gap:4px;margin-top:.45rem}
        .strength-bar span{flex:1;height:3px;border-radius:99px;background:var(--border2);transition:background .35s}
        .strength-bar[data-strength="1"] span:nth-child(1){background:#ff4f4f}
        .strength-bar[data-strength="2"] span:nth-child(1),.strength-bar[data-strength="2"] span:nth-child(2){background:#f5a623}
        .strength-bar[data-strength="3"] span:nth-child(1),.strength-bar[data-strength="3"] span:nth-child(2),.strength-bar[data-strength="3"] span:nth-child(3){background:#f5a623}
        .strength-bar[data-strength="4"] span{background:#4caf50}
    </style>
</head>
<body>
 <div th:replace="navbar :: header"></div>

<main>
    <div class="card">
        <div class="card-header">
            <div class="tag">CREATE ACCOUNT</div>
            <h1>Get started</h1>
            <p>Set up your personal finance dashboard</p>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/registration}" th:object="${user}" method="post">
                <div class="row">
                    <div class="field">
                        <label>Full Name</label>
                        <input type="text" th:field="*{fullName}" placeholder="John Doe" required/>
                        <small th:if="${#fields.hasErrors('fullName')}" style="color:#ff9090;font-size:.75rem" th:errors="*{fullName}"></small>
                    </div>
                    <div class="field">
                        <label>Username</label>
                        <input type="text" th:field="*{userName}" placeholder="johndoe" required/>
                        <small th:if="${#fields.hasErrors('userName')}" style="color:#ff9090;font-size:.75rem" th:errors="*{userName}"></small>
                    </div>
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="you@email.com" required/>
                    <small th:if="${#fields.hasErrors('email')}" style="color:#ff9090;font-size:.75rem" th:errors="*{email}"></small>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Mobile No.</label>
                        <input type="tel" th:field="*{mobileNo}" placeholder="+91 9876543210" required/>
                    </div>
                    <div class="field">
                        <label>Currency</label>
                        <select th:field="*{currency}">
                            <option value="INR">₹ INR</option>
                            <option value="USD">$ USD</option>
                            <option value="EUR">€ EUR</option>
                            <option value="GBP">£ GBP</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label>Gender</label>
                    <div class="gender-group">
                        <div class="gender-opt">
                            <input type="radio" th:field="*{gender}" id="gM" value="Male"/>
                            <label for="gM">Male</label>
                        </div>
                        <div class="gender-opt">
                            <input type="radio" th:field="*{gender}" id="gF" value="Female"/>
                            <label for="gF">Female</label>
                        </div>
                        <div class="gender-opt">
                            <input type="radio" th:field="*{gender}" id="gO" value="Other"/>
                            <label for="gO">Other</label>
                        </div>
                    </div>
                </div>

                <!-- PASSWORD -->
                <div class="field">
                    <label>Password</label>
                    <div class="pwd-wrapper">
                        <input type="password" id="pwdInput" th:field="*{password}" placeholder="Min 6 chars" required/>
                        <button type="button" class="pwd-toggle" onclick="togglePwd('pwdInput','eyeIcon1')">
                            <svg id="eyeIcon1" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="strength-bar" id="strengthBar">
                        <span></span><span></span><span></span><span></span>
                    </div>
                    <small th:if="${#fields.hasErrors('password')}" style="color:#ff9090;font-size:.75rem" th:errors="*{password}"></small>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="field">
                    <label>Confirm Password</label>
                    <div class="pwd-wrapper">
                        <input type="password" id="confirmPwd" name="confirmPassword" placeholder="Re-enter password" required/>
                        <button type="button" class="pwd-toggle" onclick="togglePwd('confirmPwd','eyeIcon2')">
                            <svg id="eyeIcon2" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <small id="confirmMsg" style="font-size:.75rem;display:none"></small>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="links">
                <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
            </div>
        </div>
    </div>
</main>

<footer>© 2026 Finwing · Financial Intelligence Platform</footer>

<script>
    function togglePwd(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(iconId);
        const show  = input.type === 'password';
        input.type  = show ? 'text' : 'password';
        icon.innerHTML = show
            ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
               <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
               <line x1="1" y1="1" x2="23" y2="23"/>`
            : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
               <circle cx="12" cy="12" r="3"/>`;
    }

    const pwdInput   = document.getElementById('pwdInput');
    const confirmPwd = document.getElementById('confirmPwd');
    const bar        = document.getElementById('strengthBar');
    const confirmMsg = document.getElementById('confirmMsg');

    pwdInput.addEventListener('input', () => {
        const v = pwdInput.value;
        let s = 0;
        if (v.length >= 6)  s++;
        if (/[A-Z]/.test(v)) s++;
        if (/[0-9]/.test(v)) s++;
        if (/[^A-Za-z0-9]/.test(v)) s++;
        bar.dataset.strength = v.length ? s : '';
    });

    confirmPwd.addEventListener('input', () => {
        if (!confirmPwd.value) { confirmMsg.style.display='none'; return; }
        const match = pwdInput.value === confirmPwd.value;
        confirmMsg.style.display = 'block';
        confirmMsg.style.color   = match ? '#4caf50' : '#ff9090';
        confirmMsg.textContent   = match ? '✓ Passwords match' : '✗ Passwords do not match';
    });
</script>
</body>
</html>
